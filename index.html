<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mely | Mi espacio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: url('otono.jpeg') no-repeat center center/cover;
    background-attachment: fixed;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
    z-index: -1;
}

.card {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(10px);
    max-width: 380px;
    width: 90%;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    animation: fadeUp 1s ease;
}

@keyframes fadeUp {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

.perfil-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid white;
    object-fit: cover;
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
}

.bio {
    font-size: 14px;
    color: #f5e6d3;
}

.stats {
    display: flex;
    justify-content: space-around;
    margin: 20px 0;
}

.btn {
    display: inline-block;
    margin: 6px;
    padding: 10px 18px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    background: linear-gradient(45deg, #6a1b9a, #8e24aa);
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

/* Redes */
.social {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
}

.social a {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    opacity: 0;
    transform: translateY(20px);
    animation: showIcons 0.6s forwards;
}

@keyframes showIcons {
    to {opacity: 1; transform: translateY(0);}
}

.social a:nth-child(1) { animation-delay: 0.2s; }
.social a:nth-child(2) { animation-delay: 0.4s; }
.social a:nth-child(3) { animation-delay: 0.6s; }
.social a:nth-child(4) { animation-delay: 0.8s; }

.ig { background: radial-gradient(circle at 30% 30%, #feda75, #fa7e1e, #d62976, #962fbf); }
.fb { background: #1877f2; }
.x { background: #000; }
.tg { background: #229ED9; }

.social a:hover {
    transform: scale(1.15);
    box-shadow: 0 0 15px rgba(255,255,255,0.4);
}

.section {
    margin-top: 20px;
    text-align: left;
}

.section h2 {
    text-align: center;
    color: #ffe0b2;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<img src="mely.jpg" class="perfil-img">

<h1>Mely ✨</h1>

<p class="bio">Soñadora | Fe ✝️ | Amante de la vida</p>

<div class="stats">
<div><strong>🌍</strong><br>Metas</div>
<div><strong>💻</strong><br>Proyectos</div>
<div><strong>🎨</strong><br>Pasiones</div>
</div>

<a href="#" class="btn">Fotos 📸</a>
<a href="https://wa.me/50241975622" class="btn">Contacto 💌</a>

<!-- BOTÓN MÚSICA -->
<button onclick="toggleMusica()" class="btn">🎵 Música</button>

<!-- AUDIO -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="social">
<a href="https://instagram.com/melymeys" class="ig"><i class="fab fa-instagram"></i></a>
<a href="https://facebook.com/mely.meys" class="fb"><i class="fab fa-facebook"></i></a>
<a href="https://x.com/mely_meys" class="x"><i class="fab fa-x-twitter"></i></a>
<a href="https://t.me/melymeys04" class="tg"><i class="fab fa-telegram"></i></a>
</div>

<div class="section">
<h2>Sobre mí</h2>
<p>Encuentro inspiración en los pequeños momentos. Amo cantar, tomar fotos y servir a los demás.</p>
</div>

</div>

<!-- SCRIPT SIEMPRE AL FINAL -->
<script>
let reproduciendo = false;
const musica = document.getElementById("musica");

function toggleMusica() {
    if (reproduciendo) {
        musica.pause();
    } else {
        musica.play();
        musica.volume = 0.2;
    }
    reproduciendo = !reproduciendo;
}
</script>

</body>
</html>
</body>
</html>
